<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meow Type</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <header>
        <i class="fa-solid fa-paw"></i>
        <h3>meowtype</h3>
    </header>

    <main>
        <div class="gametop">
            <div class="chip">
                <span class="chip-label">WPM</span>
                <span id="wpm" class="chip-value">-</span>
            </div>
            <div class="multichip"></div>
            <div class="chip">
                <span class="chip-label">ACC</span>
                <span id="accuracy" class="chip-value">-</span>
            </div>
        </div>

        <div class="game-area" tabindex="0">
            <div id="game">
                <div id="words"></div>
                <div id="cursor"></div>

                <i class="fa-solid fa-paw"></i>
            </div>

            <div id="focus-error">Click here to focus here</div>
        </div>

        <div id="game-bottom">
            <button id="new-game-button" class="button">Restart Test</button>
        </div>
    </main>

    <audio id="typeSound" src="typing.wav" preload="auto"></audio>
    <script src="script.js"></script>
</body>

</html>
